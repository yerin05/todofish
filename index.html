<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>미오 아쿠아리움 v4 (모바일 최적화 완결판)</title>
    <style>
        :root {
            --sea-dark: #001220; --sea-mid: #004a7c; --sea-light: #0094ff;
            --glass: rgba(255, 255, 255, 0.15);
        }
        
        /* 🌟 핵심 해결: 화면이 튕기거나 하단 UI가 폰 화면 밑으로 숨어버리지 않게 완벽 고정 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(180deg, var(--sea-mid) 0%, var(--sea-dark) 100%);
            color: white; margin: 0; overflow: hidden; 
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; width: 100%; height: 100%;
            -webkit-tap-highlight-color: transparent;
            display: flex; flex-direction: column;
        }

        #aquarium { flex: 1; position: relative; overflow: hidden; padding-bottom: 80px; }

        .top-ui {
            position: absolute; top: env(safe-area-inset-top, 20px); left: 20px; right: 20px;
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
            margin-top: 20px;
        }
        .badge {
            background: rgba(0,0,0,0.4); padding: 8px 16px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.15); font-size: 12px; font-weight: bold;
            backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
        }
        .storage-btn { background: var(--sea-light); border: none; color: white; cursor: pointer; }

        .creature-container { position: absolute; z-index: 50; pointer-events: auto; }
        .creature { 
            cursor: pointer; user-select: none; font-size: 30px; 
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
            -webkit-touch-callout: none;
        }
        .speech-bubble {
            position: absolute; bottom: 110%; left: 50%; transform: translateX(-50%);
            background: white; color: var(--sea-dark); padding: 6px 12px;
            border-radius: 12px; font-size: 13px; font-weight: bold; white-space: nowrap;
            display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .speech-bubble::after {
            content: ''; position: absolute; top: 100%; left: 50%;
            margin-left: -6px; border-width: 6px; border-style: solid;
            border-color: white transparent transparent transparent;
        }

        #storage-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 2000; flex-direction: column; justify-content: center; align-items: center;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }
        .modal-box {
            background: var(--sea-mid); width: 85%; max-width: 350px; max-height: 70%; border-radius: 25px;
            padding: 25px 20px; text-align: center; border: 1px solid var(--sea-light);
            display: flex; flex-direction: column;
        }
        .storage-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(50px, 1fr)); 
            gap: 12px; margin-top: 15px; overflow-y: auto; padding-bottom: 10px;
            scrollbar-width: none;
        }
        .storage-grid::-webkit-scrollbar { display: none; }
        .storage-item { 
            font-size: 32px; background: rgba(255,255,255,0.1); padding: 12px 5px; 
            border-radius: 16px; cursor: pointer; transition: transform 0.1s;
        }
        .storage-item:active { transform: scale(0.9); }

        /* 🌟 바텀 시트 트랜지션 로직 완벽 개선 (Transform 사용) */
        .ui-layer {
            position: absolute; bottom: 0; left: 0; right: 0;
            height: 60%; /* 열렸을 때 화면의 60% 차지 */
            height: 60dvh; /* 최신 브라우저 동적 뷰포트 지원 */
            background: rgba(0, 0, 0, 0.65); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 30px 30px 0 0; 
            padding: 0 20px calc(env(safe-area-inset-bottom) + 15px);
            display: flex; flex-direction: column; z-index: 1000;
            box-shadow: 0 -5px 25px rgba(0,0,0,0.3); border-top: 1px solid rgba(255,255,255,0.1);
            box-sizing: border-box;
            
            /* 평소에는 손잡이(60px)만 보이게 화면 아래로 밀어넣음 */
            transform: translateY(calc(100% - 60px - env(safe-area-inset-bottom))); 
            transition: transform 0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        
        /* 확장 클래스가 붙으면 제자리(0)로 스르륵 올라옴 */
        .ui-layer.expanded {
            transform: translateY(0);
        }
        
        .drag-handle {
            width: 100%; height: 60px; flex-shrink: 0;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; touch-action: none;
        }
        .drag-handle::after {
            content: ''; width: 40px; height: 5px; background: rgba(255,255,255,0.4);
            border-radius: 5px;
        }

        .tabs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px; flex-shrink: 0; }
        .tab { background: var(--glass); padding: 12px 5px; border-radius: 14px; text-align: center; font-size: 13px; font-weight: bold; opacity: 0.5; transition: 0.2s; cursor: pointer;}
        .tab.active { background: var(--sea-light); opacity: 1; }
